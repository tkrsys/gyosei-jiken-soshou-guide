            "text": "（処分の取消しの訴えと審査請求との関係）\n第八条　処分の取消しの訴えは、当該処分につき法令の規定により審査請求をすることができる場合においても、直ちに提起することを妨げない。ただし、法律に当該処分についての審査請求に対する裁決を経た後でなければ処分の取消しの訴えを提起することができない旨の定めがあるときは、この限りでない。\n２　前項ただし書の場合においても、次の各号の一に該当するときは、裁決を経ないで、処分の取消しの訴えを提起することができる。\n一　審査請求があつた日から三箇月を経過しても裁決がないとき。\n二　処分、処分の執行又は手続の続行により生ずる著しい損害を避けるため緊急の必要があるとき。\n三　その他裁決を経ないことにつき正当な理由があるとき。\n３　第一項本文の場合において、当該処分につき審査請求がされているときは、裁判所は、その審査請求に対する裁決があるまで、訴訟手続を中止することができる。",

function getEgovUrl(){return'https://laws.e-gov.go.jp/law/337AC0000000139';}
function getEgovApiUrl(n){return'https://laws.e-gov.go.jp/api/1/articles;lawId=337AC0000000139;article='+n;}
let currentFlow=FLOW_SECTIONS[0].id,openGroups={},openArticles={},searchQuery='';
function getImportanceBadge(i){switch(i){case'important':return{text:'重要',class:'badge-important'};case'frequent':return{text:'頻出',class:'badge-frequent'};default:return{text:'基本',class:'badge-basic'};}}
function matchSearch(a){if(!searchQuery)return true;const q=searchQuery.toLowerCase();return a.title.toLowerCase().includes(q)||a.text.toLowerCase().includes(q)||a.practical.toLowerCase().includes(q)||a.beginner.toLowerCase().includes(q)||(a.exam&&a.exam.toLowerCase().includes(q));}
function renderNavTabs(){const nav=document.getElementById('navTabs');nav.innerHTML=FLOW_SECTIONS.map(s=>`<div class="nav-item ${currentFlow===s.id?'active':''}" onclick="setFlow('${s.id}')">${s.title}</div>`).join('');}
function renderContent(){const content=document.getElementById('mainContent');let html='',visibleCount=0;const section=FLOW_SECTIONS.find(s=>s.id===currentFlow);if(!section)return;
html+=`<div class="flow-section"><div class="flow-header"><div class="flow-title">${section.title}</div><div class="flow-desc">${section.desc}</div></div><div class="flow-body">`;
section.groups.forEach((group,gi)=>{const gk=`${currentFlow}-${gi}`;const isGroupOpen=openGroups[gk];const visible=group.articles.filter(matchSearch);if(!visible.length)return;
html+=`<div class="art-group ${isGroupOpen?'open':''}" id="group-${gk}"><div class="art-group-header" onclick="toggleGroup('${gk}')"><div class="art-group-title">${group.title}</div><div style="display:flex;align-items:center;gap:8px;"><span class="art-group-count">${visible.length}条</span><span class="art-group-arrow">▶</span></div></div><div class="art-group-body"><div class="art-list">`;
visible.forEach(a=>{const ak=`${gk}-${a.num}`;const isOpen=openArticles[ak];const badge=getImportanceBadge(a.importance);visibleCount++;
const numLabel=a.num.includes('の')?`第${a.num}条`:`第${a.num}条`;
html+=`<div class="art-item ${isOpen?'open':''}" id="article-${ak}"><div class="art-header" onclick="toggleArticle('${ak}')"><div class="art-num">${numLabel}</div><div class="art-title-text">${a.title}<span class="art-badge ${badge.class}">${badge.text}</span></div><span class="art-arrow">▶</span></div>`;
if(isOpen){const apiNum=a.num.replace(/の\d+/g,'');html+=`<div class="art-detail"><div class="art-text"><div class="art-text-header"><div class="art-text-title">⚖️ 条文</div><div class="art-links"><a href="${getEgovApiUrl(apiNum)}" target="_blank" class="api-link">API直接取得</a><a href="${getEgovUrl()}" target="_blank" class="egov-link">e-Gov法令検索</a></div></div><div class="art-text-body">${a.text}</div></div><div class="explanations"><div class="exp-item exp-practical"><div class="exp-header">📘 実務・試験向け解説</div><div class="exp-body">${a.practical.replace(/\n/g,'<br>')}</div></div><div class="exp-item exp-beginner"><div class="exp-header">🌱 初学者向け解説</div><div class="exp-body">${a.beginner.replace(/\n/g,'<br>')}</div></div>${a.exam?`<div class="exp-item exp-exam"><div class="exp-header">🎯 試験対策ポイント</div><div class="exp-body">${a.exam.replace(/\n/g,'<br>')}</div></div>`:''}</div></div>`;}
html+=`</div>`;});
html+=`</div></div></div>`;});
html+=`</div></div>`;
if(!visibleCount){html=`<div class="no-results">🔍 「${searchQuery}」に一致する条文が見つかりませんでした。</div>`;}
content.innerHTML=html;
const sc=document.getElementById('searchCount');sc.textContent=searchQuery?`${visibleCount}件の条文が見つかりました`:'';}
function setFlow(id){currentFlow=id;openGroups={};openArticles={};renderNavTabs();renderContent();window.scrollTo(0,0);}
function toggleGroup(gk){openGroups[gk]=!openGroups[gk];if(!openGroups[gk]){Object.keys(openArticles).forEach(k=>{if(k.startsWith(gk))delete openArticles[k];});}renderContent();}
function toggleArticle(ak){const wasOpen=openArticles[ak];openArticles={};if(!wasOpen)openArticles[ak]=true;renderContent();if(!wasOpen)setTimeout(()=>{const el=document.getElementById('article-'+ak);if(el)el.scrollIntoView({behavior:'smooth',block:'nearest'});},50);}
function doSearch(){searchQuery=document.getElementById('searchInput').value.trim();openGroups={};openArticles={};renderContent();}
renderNavTabs();renderContent();
</script>
